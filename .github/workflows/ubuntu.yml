name: Ubuntu Desktop RDP (30GB+ Storage)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free Up Disk Space
        run: |
          echo "🧹 Cleaning up pre-installed heavy software..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: Install LXDE Desktop & XRDP (Bulletproof Version)
        run: |
          sudo apt-get update
          # XFCE এর বদলে LXDE ইন্সটল করা হচ্ছে
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y lxde xrdp dbus-x11 x11-xserver-utils
          sudo adduser xrdp ssl-cert
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Create Ubuntu User
        run: |
          sudo useradd -m -s /bin/bash ubuntuuser
          sudo adduser ubuntuuser sudo
          echo 'ubuntuuser:123456' | sudo chpasswd
          sudo sed -i 's/allowed_users=console/allowed_users=anybody/' /etc/X11/Xwrapper.config
          # LXDE-কে ডিফল্ট ডেস্কটপ হিসেবে সেট করা
          echo "startlxde" | sudo tee /home/ubuntuuser/.xsession > /dev/null
          sudo chown ubuntuuser:ubuntuuser /home/ubuntuuser/.xsession

      - name: Start Free Tunnel (No Account/Card Needed)
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          nohup ./bore local 3389 --to bore.pub > bore.log 2>&1 &
          sleep 5
          echo "========================================="
          echo "🌐 RDP Address:"
          cat bore.log | grep -Eo "bore.pub:[0-9]+"
          echo "👤 Username: ubuntuuser"
          echo "🔑 Password: 123456"
          echo "========================================="

      - name: Keep Server Running
        run: sleep 21600
